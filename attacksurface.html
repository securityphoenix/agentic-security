            <button onClick={()=>setSettingsOpen(true)} style={{padding:"5px 12px",background:"transparent",border:`1px solid ${T.accent}`,color:T.accent,cursor:"pointer",fontFamily:"monospace",fontSize:12,borderRadius:3}}>Open Settings</button>
          </div>}
          <div style={{display:"flex",gap:14,marginBottom:14,flexWrap:"wrap"}}>
            <div style={{flex:"1 1 320px",padding:"14px 16px",border:`2px dashed ${T.accent}`,borderRadius:8,background:T.bg2,display:"flex",flexDirection:"column",gap:10}}>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:T.text3,letterSpacing:"0.05em",textTransform:"uppercase"}}>Dataset</label>
              <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"12px 16px",background:T.accent,color:T===themes.dark?"#000":"#fff",cursor:"pointer",fontSize:14,fontWeight:700,borderRadius:6,border:"none",textAlign:"center"}}>
                <span style={{fontSize:18,lineHeight:1}}>↑</span>
                <span>Upload files</span>
                <input type="file" multiple onChange={handleQADatasetUpload} style={{display:"none"}}/>
              </label>
              <div style={{fontSize:12,color:T.text3,textAlign:"center",lineHeight:1.5}}>Select one or more files to upload (.zip, .py, ...)</div>
              {qaDataset.length>0&&<div style={{fontSize:12,color:T.text2,textAlign:"center",borderTop:`1px solid ${T.border}`,paddingTop:8}}>Loaded: <span style={{color:T.text,fontWeight:600}}>{qaDatasetName}</span> <span style={{color:T.text3}}>({qaDataset.length} {qaDataset.length===1?"entry":"entries"})</span></div>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
            {qaPhase==="running"
              ?<button onClick={handleCancelQA} style={{padding:"7px 14px",background:"transparent",border:`1px solid #ff2d55`,color:"#ff2d55",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
              :<button onClick={handleRunQA} disabled={!engineRef.current||!qaDataset?.length} style={{padding:"7px 14px",background:engineRef.current&&qaDataset?.length?T.accent:T.bg3,border:"none",borderRadius:6,color:engineRef.current&&qaDataset?.length?(T===themes.dark?"#000":"#fff"):T.text3,cursor:engineRef.current&&qaDataset?.length?"pointer":"not-allowed",fontSize:13,fontWeight:600}}>Run evaluation</button>}
            {qaPhase==="cancelled"&&<span style={{fontSize:12,color:"#ff8c00"}}>Cancelled — partial results below.</span>}
            {qaPhase==="done"&&<span style={{fontSize:12,color:"#34d058"}}>Done.</span>}
            {qaError&&<span style={{fontSize:12,color:"#ff2d55"}}>{qaError}</span>}
          </div>
          {qaPhase==="running"&&qaProgress.total>0&&<div style={{marginBottom:14,padding:"10px 12px",border:`1px solid ${T.border}`,borderRadius:6,background:T.bg2}}>
            <div style={{fontSize:12,color:T.text2,marginBottom:6}}>{qaProgress.current}/{qaProgress.total} — {qaProgress.label}</div>
            <div style={{width:"100%",height:6,background:T.bg3,borderRadius:3,overflow:"hidden"}}>
              <div style={{width:`${qaProgress.total?Math.round(qaProgress.current/qaProgress.total*100):0}%`,height:"100%",background:T.accent,transition:"width .2s"}}/>
            </div>
          </div>}
          {qaMetrics&&<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10,marginBottom:16}}>
              {[["TP",qaMetrics.tp,"#34d058"],["FP",qaMetrics.fp,"#ff2d55"],["FN",qaMetrics.fn,"#ff8c00"],["TN",qaMetrics.tn,T.text2],["Unscored",qaMetrics.unlabeled,T.text3],["Precision",qaMetrics.precision.toFixed(3),"#82aaff"],["Recall",qaMetrics.recall.toFixed(3),"#82aaff"],["F1",qaMetrics.f1.toFixed(3),T.accent]].map(([l,v,c])=>
                <div key={l} style={{padding:"10px 12px",border:`1px solid ${T.border}`,borderRadius:6,background:T.bg2,textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:c}}>{v}</div>
                  <div style={{fontSize:11,color:T.text3,letterSpacing:"0.05em",textTransform:"uppercase"}}>{l}</div>
                </div>
              )}
            </div>
            {qaMetrics.unlabeled>0&&<div style={{fontSize:11,color:T.text3,marginTop:-8,marginBottom:12}}>F1 computed over {qaMetrics.scored} labeled entries; {qaMetrics.unlabeled} unlabeled entries shown as predictions only.</div>}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:T.text3}}>{qaSelected.size>0?`${qaSelected.size} selected`:`${qaPredictions.length} samples`}</span>
              <button onClick={()=>setQaSelected(new Set(qaPredictions.map(p=>p.id)))} disabled={!qaPredictions.length||qaSelected.size===qaPredictions.length} style={{padding:"4px 10px",background:"transparent",border:`1px solid ${T.border}`,color:T.text2,cursor:qaPredictions.length&&qaSelected.size!==qaPredictions.length?"pointer":"not-allowed",fontSize:12,borderRadius:3,opacity:qaPredictions.length&&qaSelected.size!==qaPredictions.length?1:0.5}}>Select all</button>
              <button onClick={()=>setQaSelected(new Set())} disabled={qaSelected.size===0} style={{padding:"4px 10px",background:"transparent",border:`1px solid ${T.border}`,color:T.text2,cursor:qaSelected.size?"pointer":"not-allowed",fontSize:12,borderRadius:3,opacity:qaSelected.size?1:0.5}}>Deselect</button>
              <button onClick={()=>{if(qaSelected.size&&confirm(`Remove ${qaSelected.size} selected sample(s)?`))removeQaPredictions(qaSelected);}} disabled={qaSelected.size===0} style={{padding:"4px 10px",background:"transparent",border:`1px solid #ff2d55`,color:"#ff2d55",cursor:qaSelected.size?"pointer":"not-allowed",fontSize:12,borderRadius:3,opacity:qaSelected.size?1:0.5}}>Remove selected</button>
              <span style={{width:1,height:18,background:T.border}}/>
              <button onClick={()=>setQaExpanded(new Set(qaPredictions.map(p=>p.id)))} disabled={qaExpanded.size===qaPredictions.length} style={{padding:"4px 10px",background:"transparent",border:`1px solid ${T.border}`,color:T.text2,cursor:qaExpanded.size===qaPredictions.length?"not-allowed":"pointer",fontSize:12,borderRadius:3,opacity:qaExpanded.size===qaPredictions.length?0.5:1}}>Expand all</button>
              <button onClick={()=>setQaExpanded(new Set())} disabled={qaExpanded.size===0} style={{padding:"4px 10px",background:"transparent",border:`1px solid ${T.border}`,color:T.text2,cursor:qaExpanded.size?"pointer":"not-allowed",fontSize:12,borderRadius:3,opacity:qaExpanded.size?1:0.5}}>Collapse all</button>
              <span style={{flex:1}}/>
              <button onClick={()=>{if(confirm("Clear all samples? This deletes the saved run."))clearAllQaPredictions();}} style={{padding:"4px 10px",background:"transparent",border:`1px solid ${T.border}`,color:T.text2,cursor:"pointer",fontSize:12,borderRadius:3}}>Clear all</button>
            </div>
            <div style={{border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"32px 24px 2fr 1fr 1fr 1fr 1fr",gap:0,padding:"8px 12px",background:T.bg2,fontSize:11,fontWeight:700,color:T.text3,letterSpacing:"0.05em",textTransform:"uppercase",borderBottom:`1px solid ${T.border}`,alignItems:"center"}}>
                <div><input type="checkbox" checked={qaPredictions.length>0&&qaSelected.size===qaPredictions.length} onChange={e=>setQaSelected(e.target.checked?new Set(qaPredictions.map(p=>p.id)):new Set())} style={{cursor:"pointer"}}/></div>
                <div></div><div>Component</div><div>Ecosystem</div><div>Ground Truth</div><div>Predicted</div><div>Result</div>
              </div>
              {qaPredictions.map(p=>{
                const labeled=p.truth==="malicious"||p.truth==="clean";
                const truthPos=p.truth==="malicious";
                const predPos=p.rawLabel==="MALICIOUS"||p.rawLabel==="SUSPICIOUS"||p.rawLabel==="UNPARSED";
                const isFP=labeled&&predPos&&!truthPos,isFN=labeled&&!predPos&&truthPos,isCorrect=labeled&&predPos===truthPos;
                const rowBg=isFP?"#3a0f15":isFN?"#3a2410":"transparent";
                const labelColor=p.rawLabel==="MALICIOUS"?"#ff2d55":p.rawLabel==="SUSPICIOUS"?"#ffb800":p.rawLabel==="CLEAN"?"#34d058":T.text3;
                const resultColor=!labeled?T.text3:(isCorrect?"#34d058":isFP?"#ff2d55":"#ff8c00");
                const resultLabel=!labeled?"PRED":(isCorrect?(truthPos?"TP":"TN"):(isFP?"FP":"FN"));
                const isExpanded=qaExpanded.has(p.id);
                const toggleExpand=()=>setQaExpanded(prev=>{const n=new Set(prev);if(n.has(p.id))n.delete(p.id);else n.add(p.id);return n;});
                return <React.Fragment key={p.id}>
                  <div style={{display:"grid",gridTemplateColumns:"32px 24px 2fr 1fr 1fr 1fr 1fr",gap:0,padding:"8px 12px",background:rowBg,fontSize:13,color:T.text,borderBottom:`1px solid ${T.border}`,alignItems:"center"}}>
                    <div><input type="checkbox" checked={qaSelected.has(p.id)} onChange={()=>toggleQaSelected(p.id)} onClick={e=>e.stopPropagation()} style={{cursor:"pointer"}}/></div>
                    <div onClick={toggleExpand} title={isExpanded?"Collapse":"Show LLM description"} style={{cursor:"pointer",fontSize:16,fontWeight:700,color:T.accent,userSelect:"none",textAlign:"center"}}>{isExpanded?"−":"+"}</div>
                    <div onClick={toggleExpand} style={{fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",cursor:"pointer"}}>{p.id}</div>
                    <div onClick={toggleExpand} style={{fontSize:12,color:T.text3,cursor:"pointer"}}>{p.ecosystem}</div>
                    <div>
                      <select value={labeled?p.truth:""} onClick={e=>e.stopPropagation()} onChange={e=>setQaTruth(p.id,e.target.value)} style={{padding:"2px 6px",borderRadius:3,fontSize:11,fontWeight:600,background:!labeled?T.bg3:truthPos?"#3a0f15":"#0f3a1f",color:!labeled?T.text3:truthPos?"#fda4af":"#86efac",border:`1px solid ${T.border}`,cursor:"pointer",fontFamily:"inherit"}}>
                        <option value="">— unlabeled</option>
                        <option value="clean">clean</option>
                        <option value="malicious">malicious</option>
                      </select>
                    </div>
                    <div onClick={toggleExpand} style={{cursor:"pointer"}}><span style={{fontSize:12,fontWeight:600,color:labelColor}}>{p.rawLabel}</span></div>
                    <div onClick={toggleExpand} style={{cursor:"pointer"}}><span style={{padding:"2px 6px",borderRadius:3,fontSize:11,fontWeight:700,background:resultColor,color:labeled?"#000":T.text}}>{resultLabel}</span></div>
                  </div>
                  {isExpanded&&<div style={{padding:"10px 14px",background:T.bg3,fontSize:12,color:T.text2,borderBottom:`1px solid ${T.border}`,whiteSpace:"pre-wrap",fontFamily:"monospace",lineHeight:1.5}}>{p.error?<span style={{color:"#ff2d55"}}>Error: {p.error}</span>:p.rawText||"(empty response)"}<div style={{marginTop:6,fontSize:11,color:T.text3}}>{p.ms} ms</div></div>}
                </React.Fragment>;
              })}
            </div>
          </>}
          {!qaPredictions&&qaPhase!=="running"&&<div style={{padding:"24px",textAlign:"center",color:T.text3,fontSize:13,border:`1px dashed ${T.border}`,borderRadius:6}}>No evaluation has been run yet. {engineRef.current?"Click \"Run evaluation\" to score the loaded model against the dataset.":"Load a local LLM in Settings, then click \"Run evaluation\"."}</div>}
        </div>}
      </div>
    </div>}
  <div style={{borderTop:`1px solid ${T.border}`,padding:"10px 24px",textAlign:"center",fontSize:11,color:T.text3,background:T.bg2,flexShrink:0}}>© 2026 Clear Capabilities Inc</div>
  {settingsOpen&&<div onClick={()=>setSettingsOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:24,width:560,maxWidth:"90vw",color:T.text,boxShadow:"0 12px 40px rgba(0,0,0,0.45)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <h3 style={{margin:0,fontSize:16,fontWeight:700,color:T.text}}>Local LLM (Malware Analysis)</h3>
        <button onClick={()=>setSettingsOpen(false)} style={{background:"transparent",border:"none",color:T.text3,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,padding:3,background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}}>
        {[["webllm","WebLLM (in-browser)"],["ollama","Ollama (local server)"]].map(([k,l])=>
          <button key={k} disabled={llmStatus==="loading"} onClick={()=>{setLlmBackend(k);try{localStorage.setItem("cb_llm_backend",k);}catch(_){};if(engineRef.current){engineRef.current=null;setLlmStatus("idle");setLlmProgress(null);}}} style={{flex:1,padding:"6px 10px",background:llmBackend===k?T.accent:"transparent",color:llmBackend===k?(T===themes.dark?"#000":"#fff"):T.text2,border:"none",borderRadius:4,cursor:llmStatus==="loading"?"not-allowed":"pointer",fontSize:12,fontWeight:600}}>{l}</button>
        )}
      </div>
      {llmBackend==="webllm"?<>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,fontSize:12,color:T.text2}}>
          <span style={{padding:"3px 8px",borderRadius:4,fontWeight:700,fontSize:11,background:hasWebGPU()?"#0f3a1f":"#3a0f15",color:hasWebGPU()?"#86efac":"#fda4af",border:`1px solid ${hasWebGPU()?"#34d058":"#ff2d55"}`}}>{hasWebGPU()?"✓ WebGPU":"✗ No WebGPU"}</span>
          <span style={{fontSize:11,color:T.text3}}>{hasWebGPU()?"This browser can run a local model.":"Need Chrome/Edge 113+ or Safari 18+."}</span>
        </div>
        <label style={{display:"block",fontSize:12,fontWeight:600,color:T.text3,marginBottom:6,letterSpacing:"0.05em",textTransform:"uppercase"}}>Model</label>
        <select value={llmModel} disabled={llmStatus==="loading"} onChange={e=>{const v=e.target.value;setLlmModel(v);try{localStorage.setItem("cb_llm_model",v);}catch(_){};if(engineRef.current){engineRef.current=null;setLlmStatus("idle");setLlmProgress(null);setLlmError(null);}}} style={{width:"100%",padding:"9px 12px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontFamily:"Inter,system-ui,sans-serif",fontSize:13,outline:"none"}}>
          {WEBLLM_MODELS.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
        </select>
        <p style={{fontSize:11,color:T.text3,marginTop:10,lineHeight:1.55}}>Model weights download once and cache in your browser (IndexedDB). After first load, scans run 100% offline. Inference: 10–60 seconds per file depending on hardware.</p>
      </>:<>
        <label style={{display:"block",fontSize:12,fontWeight:600,color:T.text3,marginBottom:6,letterSpacing:"0.05em",textTransform:"uppercase"}}>Ollama URL</label>
        <input type="text" value={ollamaUrl} disabled={llmStatus==="loading"||llmStatus==="ready"} onChange={e=>{setOllamaUrl(e.target.value);try{localStorage.setItem("cb_ollama_url",e.target.value);}catch(_){};}} placeholder="http://localhost:11434" style={{width:"100%",padding:"9px 12px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontFamily:"monospace",fontSize:13,outline:"none",marginBottom:12}}/>
        <label style={{display:"block",fontSize:12,fontWeight:600,color:T.text3,marginBottom:6,letterSpacing:"0.05em",textTransform:"uppercase"}}>Model {ollamaInstalled.length>0&&<span style={{textTransform:"none",letterSpacing:0,fontWeight:400,color:T.text3,opacity:0.7}}>· {ollamaInstalled.length} installed</span>}</label>
        <input type="text" list="cb-ollama-models" value={ollamaModel} disabled={llmStatus==="loading"} onChange={e=>{const v=e.target.value;setOllamaModel(v);try{localStorage.setItem("cb_ollama_model",v);}catch(_){};if(engineRef.current){engineRef.current=null;setLlmStatus("idle");setLlmProgress(null);setLlmError(null);}}} placeholder="qwen3.5:9b" spellCheck={false} autoCapitalize="off" autoCorrect="off" style={{width:"100%",padding:"9px 12px",background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontFamily:"monospace",fontSize:13,outline:"none"}}/>
        <datalist id="cb-ollama-models">
          {Array.from(new Set([...ollamaInstalled,...OLLAMA_POPULAR_MODELS])).map(m=><option key={m} value={m}/>)}
        </datalist>
        <p style={{fontSize:11,color:T.text3,marginTop:10,lineHeight:1.55}}>Type any Ollama model tag (e.g. <code style={{background:T.bg3,padding:"1px 4px",borderRadius:3}}>qwen3.5:9b</code>, <code style={{background:T.bg3,padding:"1px 4px",borderRadius:3}}>llama3.2:3b</code>) — browse the full catalog at <a href="https://ollama.com/library" target="_blank" rel="noreferrer" style={{color:T.accent}}>ollama.com/library</a>. Suggestions include popular models plus anything you've already pulled locally.</p>
        <p style={{fontSize:11,color:T.text3,marginTop:8,lineHeight:1.55}}>Requires Ollama running locally. Setup:<br/>1. <code style={{background:T.bg3,padding:"1px 4px",borderRadius:3}}>brew install ollama</code> (or download from ollama.com)<br/>2. <code style={{background:T.bg3,padding:"1px 4px",borderRadius:3}}>ollama pull {ollamaModel||"<model>"}</code><br/>3. <code style={{background:T.bg3,padding:"1px 4px",borderRadius:3}}>OLLAMA_ORIGINS="*" ollama serve</code> (the env var is required so the browser can connect across origins)</p>
      </>}
      {llmStatus==="loading"&&llmProgress&&<div style={{marginTop:14,padding:"10px 12px",border:`1px solid ${T.border}`,borderRadius:6,background:T.bg}}>
        <div style={{fontSize:12,color:T.text2,marginBottom:6}}>{llmProgress.text||"Loading..."}</div>
        <div style={{width:"100%",height:6,background:T.bg3,borderRadius:3,overflow:"hidden"}}>
          <div style={{width:`${Math.round(((llmProgress.progress||0)*100))}%`,height:"100%",background:T.accent,transition:"width .2s"}}/>
        </div>
      </div>}
      {llmStatus==="ready"&&<div style={{marginTop:14,padding:"8px 12px",borderRadius:6,fontSize:12,background:"#0f3a1f",border:"1px solid #34d058",color:"#86efac"}}>✓ Model loaded and ready.</div>}
      {llmError&&<div style={{marginTop:14,padding:"8px 12px",borderRadius:6,fontSize:12,background:"#3a0f15",border:"1px solid #ff2d55",color:"#fda4af",wordBreak:"break-word"}}>✗ {llmError}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:20,flexWrap:"wrap"}}>
        {llmBackend==="webllm"&&<button onClick={async()=>{
          if(!confirm(`Delete cached weights for "${llmModel}"?\n\nThis frees disk space but will require re-downloading if you reload this model later.`))return;
          setLlmError(null);
          try{
            await deleteWebLLMModel(llmModel);
            if(engineRef.current){engineRef.current=null;setLlmStatus("idle");setLlmProgress(null);}
            setLlmError("Cache cleared for "+llmModel);
          }catch(e){setLlmError("Delete failed: "+(e.message||e));}
        }} style={{padding:"7px 14px",background:"transparent",border:`1px solid #ff2d55`,borderRadius:6,color:"#ff2d55",cursor:"pointer",fontSize:13}}>Delete cached weights</button>}
        <span style={{flex:1}}/>
        <button onClick={()=>setSettingsOpen(false)} style={{padding:"7px 14px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,color:T.text2,cursor:"pointer",fontSize:13}}>Close</button>
        <button disabled={(llmBackend==="webllm"&&!hasWebGPU())||llmStatus==="loading"} onClick={loadModel} style={{padding:"7px 14px",background:llmStatus==="ready"?T.bg3:T.accent,border:llmStatus==="ready"?`1px solid ${T.border}`:"none",borderRadius:6,color:llmStatus==="ready"?T.text2:(T===themes.dark?"#000":"#fff"),cursor:((llmBackend==="ollama"||hasWebGPU())&&llmStatus!=="loading")?"pointer":"not-allowed",fontSize:13,fontWeight:600,opacity:(llmBackend==="webllm"&&!hasWebGPU())||llmStatus==="loading"?0.5:1}}>{llmStatus==="loading"?"Loading...":llmStatus==="ready"?(llmBackend==="ollama"?"Reconnect":"Reload"):(llmBackend==="ollama"?"Connect":"Load model")}</button>
      </div>
    </div>
  </div>}
  </div></ThemeCtx.Provider>;}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
