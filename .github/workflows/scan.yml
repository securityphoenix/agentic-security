name: agentic-security scan

# Reusable workflow. Consumers reference it via:
#
#   jobs:
#     security:
#       permissions:
#         contents: read         # required: checkout
#         security-events: write # required: SARIF upload to Security tab
#         pull-requests: write   # required: PR comment
#       uses: Clear-Capabilities/agentic-security/.github/workflows/scan.yml@main
#       with:
#         fail-on: critical
#         baseline: main
#
# IMPORTANT: GitHub will reject the workflow with
#   "Error calling workflow ... The nested job is requesting
#    'pull-requests: write, security-events: write', but is only
#    allowed 'pull-requests: none, security-events: none'"
# unless the calling job declares the permissions block above. A reusable
# workflow can only USE permissions the caller has granted.

on:
  workflow_call:
    inputs:
      fail-on:
        description: 'Fail the job at this severity or above (critical|high|medium|low|none)'
        required: false
        default: 'critical'
        type: string
      baseline:
        description: 'Git ref to diff against; only NEW findings since this ref count'
        required: false
        default: ''
        type: string
      paths-ignore:
        description: 'Newline-separated glob list to ignore'
        required: false
        default: ''
        type: string
      output-sarif:
        description: 'Whether to upload findings as SARIF to GitHub Security tab'
        required: false
        default: 'true'
        type: string
      # Premortem 4R-3: pinning the bundle to an immutable ref (release tag or
      # commit SHA) hardens against supply-chain swap on main. The default 'main'
      # remains for ease-of-use but downstream users SHOULD pin to a tag.
      scanner-ref:
        description: 'Git ref to download the bundle from — pin to a release tag or commit SHA for supply-chain hardening'
        required: false
        default: 'main'
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required for SARIF upload
      pull-requests: write     # required for the PR-comment step
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need history to diff against baseline

      - uses: actions/setup-node@v5
        with: { node-version: '22' }

      - name: Download bundled scanner
        env:
          SCANNER_REF: ${{ inputs.scanner-ref }}
        run: |
          # Premortem 4R-3: pull both the bundle AND its committed checksum
          # file from the SAME ref so a partial-tampering attack on the CDN
          # (mismatched bundle vs. checksum) is detected. Pinning the ref to
          # a release tag or commit SHA further hardens against repo compromise.
          set -euo pipefail
          BASE="https://raw.githubusercontent.com/Clear-Capabilities/agentic-security/${SCANNER_REF}/scanner/dist"
          curl -sSL --fail -o /tmp/agentic-security.mjs        "${BASE}/agentic-security.mjs"
          curl -sSL --fail -o /tmp/agentic-security.mjs.sha256 "${BASE}/agentic-security.mjs.sha256" || true
          if [ -s /tmp/agentic-security.mjs.sha256 ]; then
            ACTUAL=$(sha256sum /tmp/agentic-security.mjs | awk '{print $1}')
            EXPECTED=$(awk '{print $1}' /tmp/agentic-security.mjs.sha256)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "agentic-security: bundle checksum mismatch — expected $EXPECTED, got $ACTUAL" >&2
              exit 1
            fi
            echo "agentic-security: bundle checksum verified (${ACTUAL:0:12}…)"
          else
            echo "agentic-security: no committed checksum at ${SCANNER_REF} — proceeding without integrity check." >&2
          fi
          chmod +x /tmp/agentic-security.mjs

      - name: Apply paths-ignore to rules
        if: ${{ inputs.paths-ignore != '' }}
        run: |
          mkdir -p .agentic-security
          # Merge caller's paths-ignore into rules.yml without overwriting
          # any existing ignorePaths already present in the project.
          RULES=.agentic-security/rules.yml
          if [ ! -f "$RULES" ]; then
            echo "ignorePaths:" > "$RULES"
          fi
          # Append each non-blank line from paths-ignore as a new entry
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            echo "  - $line" >> "$RULES"
          done <<'PATHS_EOF'
          ${{ inputs.paths-ignore }}
          PATHS_EOF

      - name: Run scan
        id: scan
        env:
          BASELINE: ${{ inputs.baseline }}
          FAIL_ON: ${{ inputs.fail-on }}
        run: |
          set +e
          if [ -n "$BASELINE" ]; then
            node /tmp/agentic-security.mjs scan . --changed-since "$BASELINE" --format sarif --output /tmp/security.sarif
          else
            node /tmp/agentic-security.mjs scan . --format sarif --output /tmp/security.sarif
          fi
          SCAN_EC=$?
          echo "exit_code=$SCAN_EC" >> "$GITHUB_OUTPUT"
          # Also dump JSON for the PR-comment step
          if [ -n "$BASELINE" ]; then
            node /tmp/agentic-security.mjs scan . --changed-since "$BASELINE" --format json --output /tmp/security.json
          else
            node /tmp/agentic-security.mjs scan . --format json --output /tmp/security.json
          fi

      - name: Upload SARIF
        if: ${{ inputs.output-sarif == 'true' }}
        # continue-on-error: SARIF upload failures (fingerprint drift, quota,
        # permission issues) must never block the pipeline — findings are
        # already reported in the PR comment and the severity-threshold step.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/security.sarif

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('/tmp/security.json', 'utf8'));
            const sev = { critical: 0, high: 0, medium: 0, low: 0, info: 0 };
            for (const f of r.findings) sev[f.severity] = (sev[f.severity]||0)+1;
            const top = r.findings.filter(f=>['critical','high'].includes(f.severity)).slice(0,10);
            const body = [
              '## agentic-security scan',
              '',
              '| Critical | High | Medium | Low | Info |',
              '|---:|---:|---:|---:|---:|',
              `| ${sev.critical} | ${sev.high} | ${sev.medium} | ${sev.low} | ${sev.info} |`,
              '',
              top.length ? '### Top critical/high findings' : '_No critical or high findings._',
              '',
              ...top.map(f => `- **[${f.severity.toUpperCase()}]** \`${f.file}:${f.line}\` — ${f.vuln}${f.cwe ? ` (${f.cwe})` : ''}`),
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Enforce severity threshold
        env:
          FAIL_ON: ${{ inputs.fail-on }}
          EC: ${{ steps.scan.outputs.exit_code }}
        run: |
          # Exit codes: 0=clean 1=low/medium 2=high 3=critical 4=error
          EC="${EC:-0}"
          case "$FAIL_ON" in
            critical) [ "$EC" -ge 3 ] && exit 1 || exit 0 ;;
            high)     [ "$EC" -ge 2 ] && exit 1 || exit 0 ;;
            medium)   [ "$EC" -ge 1 ] && exit 1 || exit 0 ;;
            low)      [ "$EC" -ge 1 ] && exit 1 || exit 0 ;;
            none)     exit 0 ;;
            *)        echo "Unknown fail-on: $FAIL_ON"; exit 1 ;;
          esac
