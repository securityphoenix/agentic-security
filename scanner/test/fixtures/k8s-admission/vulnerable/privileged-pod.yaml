apiVersion: v1
kind: Pod
metadata:
  name: legacy-agent
spec:
  hostNetwork: true
  hostPID: true
  containers:
    - name: agent
      image: nginx:latest
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
        runAsNonRoot: false
        runAsUser: 0
        capabilities:
          add:
            - SYS_ADMIN
            - NET_ADMIN
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
