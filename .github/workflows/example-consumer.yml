name: Example consumer of agentic-security scan

# Drop this file into another repo as `.github/workflows/security.yml`
# and you get PR-comment + SARIF-upload + severity-gating for free.

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  security:
    # Reusable workflows can only USE permissions the calling job has granted.
    # The scan workflow needs:
    #   contents: read         (to checkout code)
    #   security-events: write (to upload the SARIF report to the Security tab)
    #   pull-requests: write   (to post the findings comment on PRs)
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    uses: clearcapabilities/agentic-security/.github/workflows/scan.yml@main
    with:
      fail-on: critical
      baseline: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
      output-sarif: 'true'
      paths-ignore: |
        scanner/src/engine.js
